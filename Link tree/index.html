      align-items: center;

      padding: 2.5rem 1.25rem;

    .card {
      width: 100%;
      max-width: 500px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.7s ease-out both;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {

    .units {

    .unit {

      gap: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 1rem;
      border: 1px solid rgba(217, 165, 43, 0.4);
      background: linear-gradient(180deg, var(--gold-light), var(--gold));
      color: var(--burgundy);
      text-decoration: none;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      opacity: 0;
      animation: slideUp 0.5s ease-out forwards;
    }

    .unit:nth-child(1) { animation-delay: 0.15s; }
    .unit:nth-child(2) { animation-delay: 0.27s; }
    .unit:nth-child(3) { animation-delay: 0.39s; }

    .unit:hover,
    .unit:active {
      transform: scale(1.02);
      border-color: var(--gold-light);
      box-shadow: 0 15px 40px -10px rgba(217, 165, 43, 0.5);
    }

    .unit:active {
      transform: scale(0.99);
    }

    .icon {
      flex-shrink: 0;
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      background-color: var(--burgundy);
      color: var(--gold-pale);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s ease;
    }

    .unit:hover .icon {
      transform: rotate(-6deg);
    }

    .icon svg {
      width: 1.25rem;
      height: 1.25rem;
      stroke-width: 2.2;
    }

    .unit-text {
      display: flex;
      flex-direction: column;
      text-align: left;
      min-width: 0;
      flex: 1;
    }

    .unit-name {
      font-size: clamp(0.95rem, 4vw, 1.125rem);
      font-weight: 600;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unit-action {
      font-size: clamp(0.75rem, 3.2vw, 0.875rem);
      font-weight: 500;
      color: rgba(90, 26, 29, 0.75);
    }

    .arrow {
      flex-shrink: 0;
      font-size: 1.25rem;
      color: rgba(90, 26, 29, 0.6);
      transition: transform 0.3s ease;
    }

    .unit:hover .arrow {
      transform: translateX(0.25rem);
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(248, 236, 210, 0.6);
    }

    footer .heart {

    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(0.75rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 360px) {
      .container {
        padding: 2rem 1rem;
      }
      .unit {
        padding: 0.875rem 1rem;
      }
      .icon {
        width: 2.5rem;
        height: 2.5rem;
      }
    }

</head>
